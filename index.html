<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Data Entry Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .table-responsive { background: white; border-radius: 8px; }
        .btn-sync { white-space: nowrap; }
        @media (max-width: 768px) {
            .btn-mobile-full { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="mb-4">
        <h2 class="text-primary">Field Data Entry</h2>
    </header>

    <div class="card">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Initials</label>
                    <input type="text" id="initials" class="form-control" placeholder="JD">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Res</label>
                    <input type="text" id="res" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <div class="input-group">
                        <input type="date" id="fieldDate" class="form-control">
                        <button class="btn btn-outline-secondary" onclick="setCurrentDate()">Today</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">YSI-Cord (GPS)</label>
                    <div class="input-group">
                        <input type="text" id="ysiCord" class="form-control" placeholder="0.0000, 0.0000">
                        <button class="btn btn-outline-primary" onclick="getLocation()">Get GPS</button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">VP Day Num</label>
                    <input type="number" id="vpDay" class="form-control">
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-hover align-middle mb-0" id="entryTable">
            <thead class="table-dark">
                <tr>
                    <th>Transect</th>
                    <th>Profile #</th>
                    <th>Depth (m)</th>
                    <th>Time (24h)</th>
                    <th>Air Temp (C)</th>
                    <th>Wind Spd (m/s)</th>
                    <th>Wind Dir</th>
                    <th>Secchi (d/u, m)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="row-1">
                    <td><input type="text" class="form-control t-transect"></td>
                    <td><input type="number" class="form-control t-profile"></td>
                    <td><input type="number" step="0.1" class="form-control t-depth"></td>
                    <td><input type="text" class="form-control t-time"></td>
                    <td><input type="number" step="0.1" class="form-control t-temp"></td>
                    <td><input type="number" step="0.1" class="form-control t-wind-spd"></td>
                    <td><input type="text" class="form-control t-wind-dir"></td>
                    <td><input type="text" class="form-control t-secchi"></td>
                    <td>
                        <button class="btn btn-sm btn-success btn-sync" onclick="autoFillRow('row-1')">Auto-fill</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 mb-5 d-flex flex-wrap gap-2">
        <button class="btn btn-secondary" onclick="addRow()">+ Add Row</button>
        <button class="btn btn-primary" onclick="exportCSV()">Export to .CSV</button>
    </div>
</div>

<script>
    let rowCount = 1;

    // Set current date
    function setCurrentDate() {
        const now = new Date();
        document.getElementById('fieldDate').value = now.toISOString().split('T')[0];
    }

    // Geolocation for YSI-Cord
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                document.getElementById('ysiCord').value = `${lat}, ${lon}`;
            }, (err) => alert("Error getting location: " + err.message));
        } else {
            alert("Geolocation not supported by this browser.");
        }
    }

    // Add a new row to the table
    function addRow() {
        rowCount++;
        const tbody = document.getElementById('tableBody');
        const newRow = document.createElement('tr');
        newRow.id = `row-${rowCount}`;
        newRow.innerHTML = `
            <td><input type="text" class="form-control t-transect"></td>
            <td><input type="number" class="form-control t-profile"></td>
            <td><input type="number" step="0.1" class="form-control t-depth"></td>
            <td><input type="text" class="form-control t-time"></td>
            <td><input type="number" step="0.1" class="form-control t-temp"></td>
            <td><input type="number" step="0.1" class="form-control t-wind-spd"></td>
            <td><input type="text" class="form-control t-wind-dir"></td>
            <td><input type="text" class="form-control t-secchi"></td>
            <td><button class="btn btn-sm btn-success btn-sync" onclick="autoFillRow('row-${rowCount}')">Auto-fill</button></td>
        `;
        tbody.appendChild(newRow);
    }

    // Auto-fill specific row data (Time + Weather)
    async function autoFillRow(rowId) {
        const row = document.getElementById(rowId);
        
        // 1. Fill Time (24h)
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0');
        row.querySelector('.t-time').value = timeStr;

        // 2. Fetch Weather Data (via Open-Meteo)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                try {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await response.json();
                    const cw = data.current_weather;

                    row.querySelector('.t-temp').value = cw.temperature;
                    row.querySelector('.t-wind-spd').value = (cw.windspeed / 3.6).toFixed(2); // km/h to m/s
                    row.querySelector('.t-wind-dir').value = cw.winddirection + "°";
                } catch (e) {
                    alert("Weather fetch failed. Check connection.");
                }
            });
        } else {
            alert("Geolocation required for weather data.");
        }
    }

    // Export Table to CSV
    function exportCSV() {
        let csv = [];
        // Header Info
        csv.push("Initials,Res,Date,YSI-Cord,VP Day Num");
        csv.push(`${document.getElementById('initials').value},${document.getElementById('res').value},${document.getElementById('fieldDate').value},"${document.getElementById('ysiCord').value}",${document.getElementById('vpDay').value}`);
        csv.push(""); // spacer
        
        // Table Headings
        csv.push("Transect,Profile Number,Depth (m),Time,Air Temp (C),Wind Speed (m/s),Wind Direction,Secchi Depth");

        // Table Rows
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('input');
            // Clean values: strip the degree symbol '°' from the export data
            const rowData = Array.from(cols).map(input => `"${input.value.replace('°', '')}"`);
            csv.push(rowData.join(","));
        });

        // Download trigger
        const csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
        const downloadLink = document.createElement("a");
        downloadLink.download = `FieldData_${new Date().getTime()}.csv`;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
    }
</script>

</body>
</html>
