<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Data Entry Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .table-responsive { background: white; border-radius: 8px; }
        .btn-sync { white-space: nowrap; }
        .coord-input { min-width: 100px; font-size: 0.85rem; }
        .table th { font-size: 0.85rem; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="mb-4">
        <h2 class="text-primary">Field Data Entry</h2>
    </header>

    <div class="card">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Initials</label>
                    <input type="text" id="initials" class="form-control" placeholder="JD">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Res</label>
                    <input type="text" id="res" class="form-control" placeholder="Site Name">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <div class="input-group">
                        <input type="date" id="fieldDate" class="form-control">
                        <button class="btn btn-outline-secondary" onclick="setCurrentDate()">Today</button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">VP Day Num</label>
                    <input type="number" id="vpDay" class="form-control">
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-hover align-middle mb-0" id="entryTable">
            <thead class="table-dark">
                <tr>
                    <th>Transect</th>
                    <th>Profile</th>
                    <th>Depth (m)</th>
                    <th>Secchi Down</th>
                    <th>Secchi Up</th>
                    <th>Time (24h)</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Air Temp (C)</th>
                    <th>Wind Spd (m/s)</th>
                    <th>Wind Dir</th>
                    <th style="min-width: 150px;">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Row template called via JS to keep it consistent -->
            </tbody>
        </table>
    </div>

    <div class="mt-4 mb-5 d-flex flex-wrap gap-2">
        <button class="btn btn-secondary" onclick="addRow()">+ Add Row</button>
        <button class="btn btn-primary" onclick="exportCSV()">Export to .CSV</button>
    </div>
</div>

<script>
    let rowCount = 0;

    window.onload = () => {
        addRow();
    };

    function setCurrentDate() {
        const now = new Date();
        document.getElementById('fieldDate').value = now.toISOString().split('T')[0];
    }

    function addRow() {
        rowCount++;
        const tbody = document.getElementById('tableBody');
        const newRow = document.createElement('tr');
        newRow.id = `row-${rowCount}`;
        newRow.innerHTML = `
            <td><input type="text" class="form-control t-transect"></td>
            <td><input type="number" class="form-control t-profile"></td>
            <td><input type="number" step="0.1" class="form-control t-depth"></td>
            <td><input type="number" step="0.01" class="form-control t-secchi-down"></td>
            <td><input type="number" step="0.01" class="form-control t-secchi-up"></td>
            <td><input type="text" class="form-control t-time"></td>
            <td><input type="text" class="form-control coord-input t-lat"></td>
            <td><input type="text" class="form-control coord-input t-lon"></td>
            <td><input type="number" step="0.1" class="form-control t-temp"></td>
            <td><input type="number" step="0.1" class="form-control t-wind-spd"></td>
            <td><input type="text" class="form-control t-wind-dir"></td>
            <td>
                <div class="btn-group">
                    <button class="btn btn-sm btn-success btn-sync" onclick="autoFillRow('row-${rowCount}')">Auto</button>
                    <button class="btn btn-sm btn-danger" onclick="removeRow('row-${rowCount}')">Del</button>
                </div>
            </td>
        `;
        tbody.appendChild(newRow);
    }

    function removeRow(rowId) {
        if (confirm("Are you sure you want to delete this row?")) {
            const row = document.getElementById(rowId);
            row.remove();
        }
    }

    async function autoFillRow(rowId) {
        const row = document.getElementById(rowId);
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0');
        row.querySelector('.t-time').value = timeStr;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude.toFixed(6);
                const lon = pos.coords.longitude.toFixed(6);
                row.querySelector('.t-lat').value = lat;
                row.querySelector('.t-lon').value = lon;
                
                try {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await response.json();
                    const cw = data.current_weather;
                    row.querySelector('.t-temp').value = cw.temperature;
                    row.querySelector('.t-wind-spd').value = (cw.windspeed / 3.6).toFixed(2);
                    row.querySelector('.t-wind-dir').value = cw.winddirection + "°";
                } catch (e) {
                    alert("Weather fetch failed.");
                }
            }, (err) => alert("Error getting location: " + err.message));
        } else {
            alert("Geolocation required.");
        }
    }

    function exportCSV() {
        // Get metadata for naming
        const resName = document.getElementById('res').value.trim() || "UnknownRes";
        const entryDate = document.getElementById('fieldDate').value || "NoDate";
        
        // Sanitize Res name (remove characters that break filenames)
        const safeRes = resName.replace(/[/\\?%*:|"<>]/g, '-');

        let csv = [];
        csv.push("Initials,Res,Date,VP Day Num");
        csv.push(`${document.getElementById('initials').value},${resName},${entryDate},${document.getElementById('vpDay').value}`);
        csv.push(""); 
        
        csv.push("Transect,Profile,Depth(m),Secchi Down,Secchi Up,Time,Latitude,Longitude,Air Temp(C),Wind Spd(m/s),Wind Dir");

        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const rowData = Array.from(inputs).map(input => `"${input.value.replace('°', '')}"`);
            csv.push(rowData.join(","));
        });

        const csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
        const downloadLink = document.createElement("a");
        
        // Filename Logic: ResName_YYYY-MM-DD.csv
        downloadLink.download = `${safeRes}_${entryDate}.csv`;
        
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
</script>

</body>
</html>
